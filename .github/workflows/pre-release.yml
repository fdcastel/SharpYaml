name: pre-release

on:
  push:
    branches:
      - pre-release

permissions:
  packages: write

jobs:
  build-and-publish:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet build -c Release /p:MinVerVersionOverride=4.0.0-pre.${{ github.run_number }}

      - name: Pack
        run: dotnet pack SharpYaml/SharpYaml.csproj -c Release --no-build /p:MinVerVersionOverride=4.0.0-pre.${{ github.run_number }} -o ${{ github.workspace }}/artifacts

      - name: Push to GitHub Packages
        shell: pwsh
        run: |
          foreach ($pkg in Get-ChildItem "${{ github.workspace }}/artifacts" -Filter *.nupkg) {
            dotnet nuget push $pkg.FullName --source "https://nuget.pkg.github.com/fdcastel/index.json" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
          }
